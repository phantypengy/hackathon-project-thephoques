<!doctype html>
<meta charset="UTF-8" />
<link rel="stylesheet" href="redesign.css" />
<link rel="icon" href="assets/favicon.ico" />
<html>
  <head>
    <title>Sealio - Home</title>
    <script src="redesign.js" defer></script>
    <script src="shared.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-top">
          <h1 class="title">Sealio</h1>
        </div>
        <div class="header-bottom">
          <div class="navbar">
            <div
              class="button"
              onclick="window.location.href = 'redesign.html'"
            >
              Home
            </div>
            <div class="button" onclick="window.location.href = 'login.html'">
              Login
            </div>
            <div
              class="button"
              onclick="window.location.href = 'upload.html'"
              style="margin-right: 1px"
            >
              Upload
            </div>
            <div class="bar">
              <marquee behavior="scroll" direction="left">
                Welcome to Sealio!
              </marquee>
            </div>
            <div id="navUsername" class="navUsername"></div>
            <div class="button" onclick="logout()">Logout</div>
            <div onclick="searchItems()" class="searchicon">&#128269;</div>
            <input
              type="search"
              class="searchbar"
              placeholder="Search..."
              onkeydown="if (event.key == 'Enter') searchItems();"
            />
          </div>
        </div>
      </header>
      <div class="body">
        <div class="content">
          <div class="videoGrid">
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="playerModal" class="playerModal">
      <div class="modalBackground">
        <video id="playerVideo" controls></video>
        <button id="closePlayer" onclick="closeVideo()">x</button>
      </div>
    </div>
  </body>
</html>
