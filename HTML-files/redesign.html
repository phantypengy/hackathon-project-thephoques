<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sealio - Home</title>
    <link rel="stylesheet" href="redesign.css" />
    <link rel="icon" href="assets/favicon.ico" />
    <script src="redesign.js" defer></script>
    <script src="shared.js" defer></script>
  </head>

  <body>
    <div class="app">
      <header class="header">
        <div class="header-top">
          <div class="brandBlock">
            <h1 class="title">Sealio</h1>
          </div>
        </div>

        <div class="header-bottom">
          <div class="navbar">
            <div
              class="button"
              onclick="window.location.href = 'redesign.html'"
            >
              Home
            </div>

            <div
              class="button"
              onclick="window.location.href = 'watchlater.html'"
            >
              Watch Later
            </div>

            <div class="button" onclick="window.location.href = 'upload.html'">
              Upload
            </div>

            <div class="button" onclick="window.location.href = 'account.html'">
              My Seal
            </div>

            <div class="bar">
              <marquee behavior="scroll" direction="left">
                Welcome to Sealio!
              </marquee>
            </div>

            <div id="navUsername" class="navUsername"></div>
            <div class="button" id="authBtn" onclick="logout()">Logout</div>
            <div onclick="searchItems()" class="searchicon">&#128269;</div>

            <input
              type="search"
              class="searchbar"
              placeholder="Search videos..."
              onkeydown="if (event.key == 'Enter') searchItems();"
            />
          </div>
        </div>
      </header>
      <div class="body">
        <div class="content">
          <section class="heroBanner">
            <div class="heroText">
              <p class="heroEyebrow">SEALIO COLLECTION</p>
              <h2 class="heroHeading">Discover videos on Sealio</h2>
              <p class="heroDescription">
                Browse through users' uploads, build your own watch list in a
                streaming space inspired by the golden era of online videos.
              </p>
            </div>
          </section>

          <section class="librarySection">
            <div class="sectionHeadingRow">
              <h3 class="sectionHeading">Featured Videos</h3>
              <p class="sectionSubtext">
                Explore the collection of uploaded videos
              </p>
            </div>

            <div class="videoGrid">
              <div class="video">
                <div class="thumbnail">
                  <img src="" alt="Video Thumbnail" />
                </div>
                <div class="videoInfo">
                  <h4 class="videoTitle"></h4>
                  <p class="channelName"></p>
                </div>
              </div>

              <div class="video">
                <div class="thumbnail">
                  <img src="" alt="Video Thumbnail" />
                </div>
                <div class="videoInfo">
                  <h4 class="videoTitle"></h4>
                  <p class="channelName"></p>
                </div>
              </div>

              <div class="video">
                <div class="thumbnail">
                  <img src="" alt="Video Thumbnail" />
                </div>
                <div class="videoInfo">
                  <h4 class="videoTitle"></h4>
                  <p class="channelName"></p>
                </div>
              </div>

              <div class="video">
                <div class="thumbnail">
                  <img src="" alt="Video Thumbnail" />
                </div>
                <div class="videoInfo">
                  <h4 class="videoTitle"></h4>
                  <p class="channelName"></p>
                </div>
              </div>

              <div class="video">
                <div class="thumbnail">
                  <img src="" alt="Video Thumbnail" />
                </div>
                <div class="videoInfo">
                  <h4 class="videoTitle"></h4>
                  <p class="channelName"></p>
                </div>
              </div>

              <div class="video">
                <div class="thumbnail">
                  <img src="" alt="Video Thumbnail" />
                </div>
                <div class="videoInfo">
                  <h4 class="videoTitle"></h4>
                  <p class="channelName"></p>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>
  </body>
</html>
