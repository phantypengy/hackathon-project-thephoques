<!doctype html>
<meta charset="UTF-8" />
<link rel="stylesheet" href="redesign.css" />
<html>
  <head>
    <title>Sealio Aero</title>
    <script src="redesign.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-top">
          <h1 class="title">Sealio</h1>
        </div>
        <div class="header-bottom">
          <div class="navbar">
            <div class="button">Home</div>
            <div class="button">About</div>
            <div class="button">Saved</div>
            <div class="button" style="margin-right: 1px">Upload</div>
            <div class="bar">
              <marquee behavior="scroll" direction="left">
                Welcome to Sealio!
              </marquee>
            </div>
            <div onclick="searchItems()" class="searchicon">&#128269;</div>
            <input type="search" class="searchbar" placeholder="Search..." />
          </div>
        </div>
      </header>
      <div class="body">
        <div class="content">
          <div class="videoGrid">
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle"></h4>
                <p class="channelName"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="playerModal" class="playerModal">
      <div class="modalBackground">
        <video id="playerVideo" controls></video>
        <button id="closePlayer" onclick="closeVideo()">x</button>
      </div>
    </div>
  </body>
</html>
