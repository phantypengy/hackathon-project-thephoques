<!doctype html>
<meta charset="UTF-8" />
<link rel="stylesheet" href="redesign.css" />
<html>
  <head>
    <title>Sealio Aero</title>
    <script src="redesign.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-top">
          <h1 class="title">Sealio</h1>
        </div>
        <div class="header-bottom">
          <div class="navbar">
            <div class="button">Home</div>
            <div class="button">About</div>
            <div class="button">Saved</div>
            <div class="button" style="margin-right: 1px">Upload</div>
            <div class="bar">
              <marquee behavior="scroll" direction="left">
                Welcome to Sealio!
              </marquee>
            </div>
            <div class="searchicon">&#x1F50E;</div>
            <input class="searchbar" />
          </div>
        </div>
      </header>
      <div class="body">
        <div class="sidebar"></div>
        <div class="content">
          <div class="videoGrid">
            <div class="video">
              <div class="thumbnail">
                <img src="blake.png" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle">video1</h4>
                <p class="channelName">channel1</p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="assets/images/blake.png" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle">video2</h4>
                <p class="channelName">channel2</p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="assets/images/alex.png" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle">video3</h4>
                <p class="channelName">channel3</p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="assets/images/fifster!!!.jpg" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle">video4</h4>
                <p class="channelName">channel4</p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="assets/images/meow.png" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle">video5</h4>
                <p class="channelName">channel5</p>
              </div>
            </div>
            <div class="video">
              <div class="thumbnail">
                <img src="assets/images/PICT0016.jpg" alt="Video Thumbnail" />
              </div>
              <div class="videoInfo">
                <h4 class="videoTitle">video6</h4>
                <p class="channelName">channel6</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
