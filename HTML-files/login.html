<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sealio - Login</title>
    <link rel="stylesheet" href="redesign.css" />
    <link rel="icon" href="assets/favicon.ico" />
    <script src="login.js" defer></script>
    <script src="shared.js" defer></script>
  </head>

  <body>
    <div class="app">
      <header class="header">
        <div class="header-top">
          <div class="brandBlock">
            <h1 class="title">Sealio</h1>
            <p class="tagline">Classic streaming, timeless stories</p>
          </div>
        </div>

        <div class="header-bottom">
          <div class="navbar">
            <div
              class="button"
              onclick="window.location.href = 'redesign.html'"
            >
              Home
            </div>

            <div class="button" onclick="window.location.href = 'login.html'">
              Login
            </div>

            <div class="button" onclick="window.location.href = 'upload.html'">
              Upload
            </div>

            <div class="bar">
              <marquee behavior="scroll" direction="left">
                Welcome to Sealio!
              </marquee>
            </div>

            <div id="navUsername" class="navUsername"></div>
            <div class="button" onclick="logout()">Logout</div>
          </div>
        </div>
      </header>

      <div class="body">
        <div class="content">
          <div class="loginContainer">
            <div class="loginWindow">
              <!-- ▼ NEW AUTH INTRO START -->
              <div class="authIntro">
                <p class="heroEyebrow">SEALIO ACCOUNT</p>
                <h2 class="authHeading">Access your Sealio profile</h2>
                <p class="authSubtext">
                  Log in to upload videos, save content, and personalise your
                  streaming experience.
                </p>
              </div>
              <!-- ▲ NEW AUTH INTRO END -->

              <div class="loginTabs">
                <div class="loginTab active" onclick="switchTab('login')">
                  Login
                </div>
                <div class="loginTab" onclick="switchTab('signup')">
                  Sign Up
                </div>
              </div>

              <!-- ▼ UPDATED LOGIN FORM START -->
              <div id="loginForm" class="authForm">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your username" />

                <label for="loginPassword">Password</label>
                <input
                  type="password"
                  id="loginPassword"
                  placeholder="Enter your password"
                />

                <p id="loginError" class="errorText"></p>

                <button class="authActionBtn" onclick="login()">Log in</button>
              </div>
              <!-- ▲ UPDATED LOGIN FORM END -->

              <!-- ▼ UPDATED SIGNUP FORM START -->
              <div id="signupForm" class="authForm" style="display: none">
                <label for="signupUsername">Username</label>
                <input type="text" id="signupUsername" placeholder="Choose a username" />

                <label for="signupPassword">Password</label>
                <input
                  type="password"
                  id="signupPassword"
                  placeholder="Create a password"
                />

                <label for="signupConfirm">Confirm Password</label>
                <input
                  type="password"
                  id="signupConfirm"
                  placeholder="Re-enter your password"
                />

                <p id="signupError" class="errorText"></p>

                <button class="authActionBtn" onclick="signup()">Create account</button>
              </div>
              <!-- ▲ UPDATED SIGNUP FORM END -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
